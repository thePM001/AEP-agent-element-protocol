aep_version: "2.0"
schema_revision: 1

# ===========================================================================
# AEP-FCR: Frontend Component Registry
# Layer 2: Behaviour
# Contains NO visual properties. All styling delegated via skin_binding.
# ===========================================================================

# ---------------------------------------------------------------------------
# STRUCTURAL CONTAINERS (Shell + Panels)
# ---------------------------------------------------------------------------

SH-00001:
  label: "App Shell"
  category: layout
  function: "Root application container that holds all top-level panels."
  component_file: "App.jsx"
  parent: null
  skin_binding: "shell"
  states:
    default: "Renders full application layout"
  actions: []
  events: {}
  constraints:
    - "Must be the sole root element with no parent"
    - "Must always occupy 100vw x 100vh"
  data_source: "None"
  user_interaction: "Container only"

PN-00001:
  label: "Header Panel"
  category: layout
  function: "Top-level header bar containing logo, action buttons and user avatar."
  component_file: "HeaderPanel.jsx"
  parent: "SH-00001"
  skin_binding: "panel_header"
  states:
    default: "Displays header contents"
  actions: []
  events: {}
  constraints:
    - "Must always be visible at all breakpoints"
    - "Must remain fixed at the top of SH-00001"
  data_source: "None"
  user_interaction: "Container only"

PN-00002:
  label: "Sidebar Navigation"
  category: layout
  function: "Left-side navigation panel containing route links."
  component_file: "Sidebar.jsx"
  parent: "SH-00001"
  skin_binding: "panel_sidebar"
  states:
    default: "Visible on medium and large viewports"
    collapsed: "Hidden on base (mobile) viewport"
  actions: []
  events: {}
  constraints:
    - "Must be hidden at base breakpoint"
    - "Must be visible at vp-md and vp-lg breakpoints"
  data_source: "None"
  user_interaction: "Container only"

PN-00003:
  label: "Main Content Area"
  category: layout
  function: "Primary content region containing toolbar, data grid and widgets."
  component_file: "MainContent.jsx"
  parent: "SH-00001"
  skin_binding: "panel_main"
  states:
    default: "Displays main content"
  actions: []
  events: {}
  constraints:
    - "Must expand to fill available space between header, sidebar and footer"
    - "Must occupy full width when sidebar is hidden (base breakpoint)"
  data_source: "None"
  user_interaction: "Container only"

PN-00004:
  label: "Footer Status Bar"
  category: layout
  function: "Bottom bar displaying connection status and version information."
  component_file: "Footer.jsx"
  parent: "SH-00001"
  skin_binding: "panel_footer"
  states:
    default: "Displays footer contents"
  actions: []
  events: {}
  constraints:
    - "Must always be visible at all breakpoints"
    - "Must remain fixed at the bottom of SH-00001"
  data_source: "None"
  user_interaction: "Container only"

