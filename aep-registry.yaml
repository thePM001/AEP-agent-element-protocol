# ===========================================================================
# FORBIDDEN PATTERNS (OPA / Rego)
# ===========================================================================
#
# AEP uses Open Policy Agent (Rego) for forbidden pattern enforcement.
# Save the following as aep-policy.rego alongside your config files.
# Evaluate with: opa eval -i input.json -d aep-policy.rego "data.aep.forbidden.deny"
#
# --- aep-policy.rego ---
#
# package aep.forbidden
#
# deny[msg] {
#   some m
#   startswith(m, "MD")
#   some g
#   startswith(g, "CZ")
#   input.scene[m].z <= input.scene[g].z
#   msg := sprintf("Modal %v (z=%v) must render above grid %v (z=%v)", [m, input.scene[m].z, g, input.scene[g].z])
# }
#
# deny[msg] {
#   some id
#   input.scene[id].parent != null
#   not input.registry[input.scene[id].parent]
#   not input.scene[input.scene[id].parent]
#   msg := sprintf("Orphan element: %v references non-existent parent %v", [id, input.scene[id].parent])
# }
#
# deny[msg] {
#   some id
#   input.registry[id].skin_binding
#   not input.theme.component_styles[input.registry[id].skin_binding]
#   msg := sprintf("Unresolved skin_binding: %v references '%v' which does not exist in theme", [id, input.registry[id].skin_binding])
# }
#
# deny[msg] {
#   some tt
#   startswith(tt, "TT")
#   some md
#   startswith(md, "MD")
#   input.scene[tt].z <= input.scene[md].z
#   msg := sprintf("Tooltip %v (z=%v) must render above modal %v (z=%v)", [tt, input.scene[tt].z, md, input.scene[md].z])
# }

