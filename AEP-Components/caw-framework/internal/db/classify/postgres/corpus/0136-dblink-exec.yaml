name: dblink-exec
spec_ref: §7.3 SELECT dblink_exec, Appendix B unsafe_io/dblink_call
description: |
  dblink_exec('host=remote dbname=db', '...') - Phase 1 simplification:
  emit an empty filesystem_path so policy rules can deny on
  group/subtype alone. Connection-string parsing is deferred.
sql: "SELECT dblink_exec('host=remote dbname=db', 'INSERT INTO t VALUES (1)')"
expected_classification:
  - raw_verb: SELECT
    primary_group: unsafe_io
    primary_subtype: dblink_call
    effects:
      - group: unsafe_io
        subtype: dblink_call
        objects:
          - { kind: filesystem_path }
      - group: read
expected_decision_under_sample_policy:
  verb: deny
  rule_name: app-deny-mutations
