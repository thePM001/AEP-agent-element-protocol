name: pg-read-binary-file
spec_ref: §7.3 SELECT pg_read_binary_file, Appendix B unsafe_io/server_file_read
description: |
  Binary variant of pg_read_file - same shape, different function name.
sql: "SELECT pg_read_binary_file('/etc/passwd')"
expected_classification:
  - raw_verb: SELECT
    primary_group: unsafe_io
    primary_subtype: server_file_read
    effects:
      - group: unsafe_io
        subtype: server_file_read
        objects:
          - { kind: filesystem_path, path: /etc/passwd }
      - group: read
expected_decision_under_sample_policy:
  verb: deny
  rule_name: app-deny-mutations
