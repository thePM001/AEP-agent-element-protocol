name: lo-import
spec_ref: §7.3 SELECT lo_import, Appendix B unsafe_io/large_object_io
description: |
  lo_import('/var/lib/foo') - large-object IO with the path as the FIRST
  argument. Classified as unsafe_io/large_object_io.
sql: "SELECT lo_import('/var/lib/foo')"
expected_classification:
  - raw_verb: SELECT
    primary_group: unsafe_io
    primary_subtype: large_object_io
    effects:
      - group: unsafe_io
        subtype: large_object_io
        objects:
          - { kind: filesystem_path, path: /var/lib/foo }
      - group: read
expected_decision_under_sample_policy:
  verb: deny
  rule_name: app-deny-mutations
