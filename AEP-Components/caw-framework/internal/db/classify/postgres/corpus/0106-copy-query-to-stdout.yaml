description: |
  COPY (SELECT * FROM customers) TO STDOUT - primary bulk_export(copy_to_stdout)
  composes with the inner SELECT's read effect on the source relation.
sql: "COPY (SELECT * FROM customers) TO STDOUT"
expected_classification:
