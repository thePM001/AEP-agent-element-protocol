name: create-temp-table
spec_ref: §7.3 CREATE TEMP TABLE
description: |
  CREATE TEMP TABLE encodes TEMP into RawVerb so applyTempLifecycle can
  register the table in SessionState.TempTables for later resolution.
sql: "CREATE TEMP TABLE bar (id int)"
expected_classification:
  - raw_verb: CREATE_TEMP_TABLE
    primary_group: schema_create
    primary_subtype: create_table
    effects:
      - group: schema_create
        subtype: create_table
        objects:
          - { kind: table, name: bar }
expected_decision_under_sample_policy:
  verb: deny
  rule_name: app-deny-mutations
