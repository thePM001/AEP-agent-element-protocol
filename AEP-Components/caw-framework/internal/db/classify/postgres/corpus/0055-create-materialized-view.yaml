name: create-materialized-view
spec_ref: §7.3 CREATE MATERIALIZED VIEW
description: |
  CREATE MATERIALIZED VIEW parses as CreateTableAsStmt with Objtype=OBJECT_MATVIEW;
  classifier emits schema_create(create_materialized_view).
sql: "CREATE MATERIALIZED VIEW mv AS SELECT 1"
expected_classification:
  - raw_verb: CREATE_MATERIALIZED_VIEW
    primary_group: schema_create
    primary_subtype: create_materialized_view
    effects:
      - group: schema_create
        subtype: create_materialized_view
        objects:
          - { kind: view, name: mv }
expected_decision_under_sample_policy:
  verb: deny
  rule_name: app-deny-mutations
