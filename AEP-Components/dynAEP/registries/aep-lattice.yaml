# =============================================================================
# dynAEP 1.0 Action Lattice Registry
# Declares all system actions, their partial-order relationships,
# constraints, and trust floors.
#
# This registry extends dynAEP's governance from UI-only (scene graph)
# to ALL agent-system interactions. Every event passes through the
# lattice filter before any output is produced.
# =============================================================================

aep_version: "1.2"
dynaep_version: "1.0"
lattice_revision: 1

# ---------------------------------------------------------------------------
# Actions
# ---------------------------------------------------------------------------
#
# Each action has:
#   category:    external_event | system_event | agent_action | output
#   parents:     list of action paths that must precede this one (partial order)
#   children:    list of action paths that may follow (forward traversal)
#   constraints: validation gates applied at event arrival time
#   trust_floor: minimum agent trust tier (1-5) to propose this action
#
# The partial order is the key governance mechanism. An action cannot
# proceed until ALL its parents have been satisfied. This prevents
# actions from firing out of sequence (e.g. executing a trade before
# running risk assessment).
#
# ---------------------------------------------------------------------------

actions:

  # ── External Events ────────────────────────────────────────────────
  # Events from outside the system. These have no parents -- they
  # arrive from the outside world and trigger everything downstream.

  webhook:incoming:
    label: "Webhook received from external service"
    category: external_event
    parents: []
    children: [webhook:validate]
    constraints:
      - type: required_field
        field: signature
        description: "Webhook must carry a cryptographic signature"
    trust_floor: 1

  blockchain:event:
    label: "Blockchain event detected (log, transfer, mint)"
    category: external_event
    parents: []
    children: [blockchain:event:verify]
    constraints:
      - type: required_field
        field: tx_hash
        description: "Must carry transaction hash for verification"
    trust_floor: 1

  email:incoming:
    label: "Email received"
    category: external_event
    parents: []
    children: [email:classify]
    constraints:
      - type: required_field
        field: from
        description: "Must have sender address"
    trust_floor: 1

  sensor:reading:
    label: "Sensor reading from IoT device"
    category: external_event
    parents: []
    children: [sensor:analyze]
    constraints:
      - type: threshold
        field: value
        condition: "within_range"
        description: "Reading must be within sensor calibrated range"
    trust_floor: 1

  # ── System Events ──────────────────────────────────────────────────
  # Events generated by the system itself (internal state changes,
  # scheduled tasks, system health).

  system:startup:
    label: "System boot or restart"
    category: system_event
    parents: []
    children: [system:health:check]
    constraints: []
    trust_floor: 1

  system:health:check:
    label: "Run system health verification"
    category: system_event
    parents: [system:startup]
    children: [system:ready]
    constraints:
      - type: required_field
        field: services
        description: "Must report status of all registered services"
    trust_floor: 2

  system:ready:
    label: "System is ready for agent operations"
    category: system_event
    parents: [system:health:check]
    children: [agent:register]
    constraints: []
    trust_floor: 2

  system:shutdown:
    label: "System shutdown requested"
    category: system_event
    parents: []
    children: [agent:deregister]
    constraints:
      - type: authorization
        field: requester
        condition: "trust_tier >= 4"
        description: "Shutdown requires high-trust authorization"
    trust_floor: 4

  schedule:tick:
    label: "Scheduled timer tick"
    category: system_event
    parents: []
    children: [schedule:match]
    constraints:
      - type: threshold
        field: interval
        condition: ">= 1000"
        description: "Minimum tick interval: 1 second"
    trust_floor: 1

  schedule:match:
    label: "Match scheduled task against registered schedules"
    category: system_event
    parents: [schedule:tick]
    children: []
    constraints: []
    trust_floor: 2

  # ── Agent Actions ──────────────────────────────────────────────────
  # Actions proposed by agents. These require higher trust floors
  # and more constraints.

  agent:register:
    label: "Register an agent with the system"
    category: agent_action
    parents: [system:ready]
    children: [agent:ready]
    constraints:
      - type: required_field
        field: capabilities
        description: "Agent must declare its capabilities"
      - type: required_field
        field: agent_type
        description: "Agent must declare its type (builder, reviewer, trader, etc)"
    trust_floor: 2

  agent:ready:
    label: "Agent is registered and ready"
    category: agent_action
    parents: [agent:register]
    children: []
    constraints: []
    trust_floor: 2

  agent:deregister:
    label: "Deregister an agent"
    category: agent_action
    parents: [system:shutdown]
    children: []
    constraints:
      - type: authorization
        field: agent_id
        condition: "matches_registered"
        description: "Agent ID must match a registered agent"
    trust_floor: 2

  agent:propose_action:
    label: "Agent proposes a system action"
    category: agent_action
    parents: [agent:ready]
    children: [action:validate]
    constraints:
      - type: required_field
        field: action_path
        description: "Must specify which lattice action path"
      - type: required_field
        field: payload
        description: "Must carry action payload"
    trust_floor: 3

  agent:interest:register:
    label: "Agent registers interest in event paths"
    category: agent_action
    parents: [agent:ready]
    children: []
    constraints:
      - type: required_field
        field: watch_paths
        description: "Must declare one or more lattice paths to watch"
      - type: required_field
        field: notify
        description: "Must specify notification mode (wake | queue | log)"
    trust_floor: 2

  agent:trade:propose:
    label: "Agent proposes a trade"
    category: agent_action
    parents: [market:price:analyze]
    children: [market:trade:validate]
    constraints:
      - type: threshold
        field: amount
        condition: "> 0"
        description: "Trade amount must be positive"
    trust_floor: 5

  agent:email:classify:
    label: "Agent classifies an incoming email"
    category: agent_action
    parents: [email:incoming]
    children: [agent:email:draft_reply]
    constraints:
      - type: required_field
        field: priority
        description: "Must assign a priority level"
    trust_floor: 3

  agent:email:draft_reply:
    label: "Agent drafts a reply to an email"
    category: agent_action
    parents: [agent:email:classify]
    children: [agent:email:review]
    constraints:
      - type: required_field
        field: draft_body
        description: "Must produce a draft response"
    trust_floor: 3

  agent:email:review:
    label: "Agent reviews draft email before sending"
    category: agent_action
    parents: [agent:email:draft_reply]
    children: [agent:email:send]
    constraints:
      - type: required_field
        field: review_result
        description: "Must pass review checks"
    trust_floor: 4

  agent:email:send:
    label: "Agent sends an email"
    category: agent_action
    parents: [agent:email:review]
    children: []
    constraints:
      - type: authorization
        field: trust_tier
        condition: ">= 4"
        description: "Sending requires trust tier 4 or higher"
    trust_floor: 4

  # ── Internal Validation Steps ──────────────────────────────────────

  webhook:validate:
    label: "Validate webhook payload"
    category: system_event
    parents: [webhook:incoming]
    children: [action:route]
    constraints:
      - type: required_field
        field: payload_valid
        condition: "true"
    trust_floor: 2

  blockchain:event:verify:
    label: "Verify blockchain event on-chain"
    category: system_event
    parents: [blockchain:event]
    children: [action:route]
    constraints:
      - type: required_field
        field: verified
        condition: "true"
    trust_floor: 3

  email:classify:
    label: "System classifies incoming email"
    category: system_event
    parents: [email:incoming]
    children: [action:route]
    constraints:
      - type: required_field
        field: category
    trust_floor: 2

  sensor:analyze:
    label: "Analyze sensor reading"
    category: system_event
    parents: [sensor:reading]
    children: [action:route]
    constraints: []
    trust_floor: 2

  action:validate:
    label: "Validate proposed action against lattice"
    category: system_event
    parents: [agent:propose_action]
    children: [action:route]
    constraints:
      - type: custom
        description: "Full lattice closure + constraint check"
    trust_floor: 1

  action:route:
    label: "Route event to matched agents"
    category: system_event
    parents: [webhook:validate, blockchain:event:verify, email:classify, sensor:analyze, action:validate]
    children: [output:notify]
    constraints:
      - type: required_field
        field: matched_agents
        description: "Must have at least one matching agent or default handler"
    trust_floor: 1

  market:price:update:
    label: "Market price update received"
    category: external_event
    parents: []
    children: [market:price:analyze]
    constraints:
      - type: threshold
        field: delta
        condition: "exists"
        description: "Must carry price delta information"
    trust_floor: 1

  market:price:analyze:
    label: "Analyze market price movement"
    category: agent_action
    parents: [market:price:update]
    children: [agent:trade:propose]
    constraints:
      - type: threshold
        field: confidence
        condition: "> 0.5"
        description: "Analysis confidence must exceed 0.5"
    trust_floor: 4

  market:trade:validate:
    label: "Validate trade against risk rules"
    category: system_event
    parents: [agent:trade:propose]
    children: [market:trade:execute]
    constraints:
      - type: required_field
        field: risk_approved
        condition: "true"
    trust_floor: 5

  market:trade:execute:
    label: "Execute validated trade"
    category: agent_action
    parents: [market:trade:validate]
    children: [output:notify]
    constraints:
      - type: authorization
        field: trust_tier
        condition: ">= 5"
        description: "Trade execution requires maximum trust"
    trust_floor: 5

  # ── Output Actions ─────────────────────────────────────────────────

  output:notify:
    label: "Send notification to user"
    category: output
    parents: [action:route, market:trade:execute]
    children: []
    constraints:
      - type: threshold
        field: urgency
        condition: "defined"
        description: "Must specify notification urgency"
    trust_floor: 1

  output:ui_mutation:
    label: "Mutate a UI element via scene graph"
    category: output
    parents: [action:route]
    children: []
    constraints:
      - type: required_field
        field: element_id
        description: "Must target a valid AEP scene element"
      - type: required_field
        field: mutation
        description: "Must carry a valid mutation delta"
    trust_floor: 2

  # Composer Lite / CCA action paths: AEP-Composer-Lite/registries/composer-cca-lattice.yaml

  output:speech:
    label: "Produce speech output to user"
    category: output
    parents: [action:route]
    children: []
    constraints:
      - type: required_field
        field: text
        description: "Must have text content for TTS"
    trust_floor: 2

  output:haptic:
    label: "Produce haptic feedback"
    category: output
    parents: [action:route]
    children: []
    constraints:
      - type: threshold
        field: duration_ms
        condition: "between 10 and 500"
        description: "Haptic duration must be within perceptual bounds"
    trust_floor: 1

# ---------------------------------------------------------------------------
# Agent Interest Registration (default)
# ---------------------------------------------------------------------------
#
# Agents register interest in lattice paths using glob patterns.
# When an event's action path matches, the bridge routes it.
#
# This section defines the schema. Actual registrations happen
# at runtime via the LATTICE_REGISTER event type.

agent_interests:
  schema:
    agent_id:
      type: string
      required: true
    watch_paths:
      type: array
      items: string
      required: true
      description: "Glob patterns matching action paths, e.g. 'market:*', 'email:incoming'"
    notify:
      type: string
      enum: [wake, queue, log]
      required: true
      description: "wake=trigger agent, queue=store for later, log=just record"
    max_rate:
      type: string
      required: false
      description: "Rate limit, e.g. '10/min', '1/sec'"
    constraints:
      type: object
      required: false
      description: "Additional match filters (e.g. threshold values)"
