version: "2.2"
name: "aep-builder"

capabilities:
  - tool: "aep:create_element"
    scope:
      element_prefixes: ["SH", "PN", "NV", "CP", "FM", "IC", "WD", "CZ", "TB", "TT", "OV", "MD", "NT", "DD"]
      z_bands: ["0-9", "10-19", "20-29", "30-39", "40-49", "50-59", "60-69", "70-79"]
  - tool: "aep:update_element"
    scope:
      element_prefixes: ["PN", "NV", "CP", "FM", "IC", "WD", "CZ", "TB", "TT", "OV", "MD", "NT", "DD"]
      exclude_ids: ["SH-00001"]
  - tool: "aep:delete_element"
    scope:
      element_prefixes: ["CP", "FM", "IC", "WD", "CZ", "TB", "TT", "NT", "DD"]
  - tool: "aep:update_skin"
    scope:
      bindings: ["*"]
  - tool: "aep:update_registry"
    scope:
      categories: ["*"]
  - tool: "file:read"
    scope:
      paths: ["aep-scene.json", "aep-registry.yaml", "aep-theme.yaml"]

limits:
  max_aep_mutations: 500
  max_runtime_ms: 3600000

gates:
  - action: "aep:delete_element"
    approval: human
    risk_level: high

forbidden:
  - pattern: "SH-00001"
    reason: "Root shell element is immutable"

session:
  max_actions: 200
  max_denials: 30
  rate_limit:
    max_per_minute: 60
  escalation:
    - after_actions: 100
      require: human_checkin
    - after_denials: 15
      require: pause

evidence:
  enabled: true
  dir: "./ledgers"

trust:
  initial_score: 600
  decay_rate: 3
  penalties:
    policy_violation: 40
    structural_violation: 50
    rate_limit: 10
    forbidden_match: 100
    intent_drift: 50
  rewards:
    successful_action: 8
    successful_rollback: 15

ring:
  default: 1
  promotion:
    to_ring_1:
      min_trust_tier: "standard"
      require_approval: false
    to_ring_0:
      min_trust_tier: "privileged"
      require_approval: true

intent:
  tracking: true
  drift_threshold: 0.4
  warmup_actions: 5
  on_drift: "gate"

system:
  max_actions_per_minute: 300
  max_concurrent_sessions: 10
