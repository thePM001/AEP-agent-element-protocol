version: "2.5"
name: "full-governance"

capabilities:
  - tool: "file:read"
    scope:
      paths: ["src/**", "tests/**", "docs/**", "*.json", "*.yaml", "*.yml", "*.md"]
  - tool: "file:write"
    scope:
      paths: ["src/**", "tests/**"]
  - tool: "directory:list"
    scope:
      paths: ["**"]
  - tool: "command:run"
    scope:
      binaries: ["npm", "node", "tsc", "git", "npx"]
  - tool: "git:status"
  - tool: "git:diff"
  - tool: "git:add"
  - tool: "git:commit"
  - tool: "aep:create_element"
    scope:
      element_prefixes: ["CP", "PN", "WD", "IC", "FM"]
      z_bands: ["10-19", "20-29", "50-59"]
  - tool: "aep:update_element"
    scope:
      element_prefixes: ["CP", "PN", "WD", "IC", "FM"]
      exclude_ids: ["SH-00001"]
  - tool: "knowledge:ingest"
  - tool: "knowledge:query"

limits:
  max_runtime_ms: 1800000
  max_files_changed: 50
  max_aep_mutations: 100
  max_cost_usd: 5.00

gates:
  - action: "file:delete"
    approval: human
    risk_level: high
  - action: "aep:delete_element"
    approval: human
    risk_level: critical
  - action: "git:push"
    approval: human
    risk_level: medium

forbidden:
  - pattern: "\\.env"
    reason: "Environment files may contain secrets"
  - pattern: "\\.secret"
    reason: "Secret files must not be accessed"
  - pattern: "rm -rf /"
    reason: "Destructive filesystem operation"
  - pattern: "chmod 777"
    reason: "Overly permissive file permissions"
  - pattern: "password|api_key|secret_key"
    reason: "Potential credential exposure"

session:
  max_actions: 200
  max_denials: 25
  rate_limit:
    max_per_minute: 40
  escalation:
    - after_actions: 100
      require: human_checkin
    - after_denials: 12
      require: pause
    - after_minutes: 25
      require: human_checkin
  auto_bundle: true

evidence:
  enabled: true
  dir: "./ledgers"

remediation:
  max_retries: 3
  cooldown_ms: 1000

trust:
  initial_score: 500
  decay_rate: 5
  penalties:
    policy_violation: 50
    structural_violation: 30
    rate_limit: 10
    forbidden_match: 100
    intent_drift: 75
  rewards:
    successful_action: 5
    successful_rollback: 10

ring:
  default: 2
  promotion:
    to_ring_1:
      min_trust_tier: "trusted"
      require_approval: false
    to_ring_0:
      min_trust_tier: "privileged"
      require_approval: true

intent:
  tracking: true
  drift_threshold: 0.5
  warmup_actions: 10
  on_drift: "warn"

identity:
  require_agent_identity: false

system:
  max_actions_per_minute: 200
  max_concurrent_sessions: 20

scanners:
  enabled: true
  pii:
    enabled: true
    severity: "soft"
  injection:
    enabled: true
    severity: "hard"
  secrets:
    enabled: true
    severity: "hard"
  jailbreak:
    enabled: true
    severity: "soft"
  toxicity:
    enabled: true
    severity: "soft"
  urls:
    enabled: true
    severity: "soft"

recovery:
  enabled: true
  max_attempts: 2

workflow:
  enabled: true
  templates:
    dev-pipeline: [plan, implement, review, approve]
    audit-pipeline: [scan, evaluate, report]

telemetry:
  otel_enabled: false
  service_name: "aep-agent"

tracking:
  tokens: true
  currency: "USD"

knowledge:
  enabled: true
  bases: []
  chunk_size: 500
  max_retrieval_chunks: 10
  anti_context_rot: true
  double_scan: true
