version: "2.2"
name: "readonly-auditor"

capabilities:
  - tool: "file:read"
    scope:
      paths: ["**"]
  - tool: "directory:list"
    scope:
      paths: ["**"]
  - tool: "git:diff"
  - tool: "git:status"
  - tool: "git:log"

limits:
  max_runtime_ms: 600000
  max_files_changed: 0
  max_aep_mutations: 0

gates: []

forbidden:
  - pattern: "file:write"
    reason: "Auditor is read-only"
  - pattern: "file:delete"
    reason: "Auditor is read-only"
  - pattern: "command:run"
    reason: "Auditor cannot execute commands"
  - pattern: "aep:create_element"
    reason: "Auditor cannot create elements"
  - pattern: "aep:update_element"
    reason: "Auditor cannot modify elements"
  - pattern: "aep:delete_element"
    reason: "Auditor cannot delete elements"
  - pattern: "aep:update_skin"
    reason: "Auditor cannot modify theme"
  - pattern: "aep:update_registry"
    reason: "Auditor cannot modify registry"

session:
  max_actions: 50
  rate_limit:
    max_per_minute: 20
  escalation: []

evidence:
  enabled: true
  dir: "./ledgers"

trust:
  initial_score: 300
  decay_rate: 10
  penalties:
    policy_violation: 100
    structural_violation: 80
    rate_limit: 20
    forbidden_match: 200
    intent_drift: 100

ring:
  default: 3

intent:
  tracking: true
  drift_threshold: 0.3
  warmup_actions: 5
  on_drift: "deny"

system:
  max_actions_per_minute: 100
  max_concurrent_sessions: 5
