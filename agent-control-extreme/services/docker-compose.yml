# Docker Compose - Agent Control Extreme full stack
# Single-container deployment of the agent control hub + GAP runtime.
# Uses Git as source of truth, PostgreSQL for session caching, Prometheus for metrics.

version: "3.9"

services:
  # --- GAP Runtime (Rust governance kernel) ---
  gap-server:
    image: gap-runtime:latest
    build:
      context: /opt/radia-platform/gap-runtime
      dockerfile: Dockerfile
    container_name: gap-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3200:3200"   # LOCAL only - Tailscale provides remote access
    command: ["--serve", "--port", "3200"]
    volumes:
      - ./policies:/etc/gap/policies:ro           # Policy files
      - gap-proofs:/var/lib/gap/proofs             # Proof chain storage
    environment:
      - RUST_LOG=info
      - GAP_POLICIES_DIR=/etc/gap/policies
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - control-net

  # --- Control Hub (Git-based agent registry) ---
  control-hub:
    image: alpine/git:latest
    container_name: control-hub
    restart: unless-stopped
    volumes:
      - control-repo:/workspace
      - ./bootstrap:/workspace/agent-control-extreme/bootstrap
      - ./policies:/workspace/agent-control-extreme/policies
      - ./registry:/workspace/agent-control-extreme/registry
    networks:
      - control-net

  # --- Session cache (optional PostgreSQL for faster session lookups) ---
  session-db:
    image: postgres:16-alpine
    container_name: session-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: agent_control
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: sessions
    volumes:
      - session-data:/var/lib/postgresql/data
    networks:
      - control-net
    profiles: [production]  # Only in prod - dev uses Git directly

  # --- Observability: Prometheus metrics ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./services/observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - control-net
    profiles: [observability]

  # --- Observability: Grafana dashboards ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./services/observability/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    networks:
      - control-net
    profiles: [observability]

networks:
  control-net:
    driver: bridge

volumes:
  gap-proofs:
  control-repo:
  session-data:
  prometheus-data:
  grafana-data:
