# Example agent error registry configuration
#
# Customize these rules for your own agent policies.
# Each check has:
#   enabled: true/false
#   description: what it looks for
#   severity: info | warning | error
#   patterns: list of things to match

registry:
  storage: registry.json
  max_entries: 1000

checks:
  forbidden_chars:
    enabled: true
    description: "Unicode characters not allowed in agent output"
    severity: warning
    chars: [0x2014, 0x2013]  # em-dash, en-dash

  low_contrast:
    enabled: true
    description: "Text that may be hard to read against dark backgrounds"
    severity: warning
    min_opacity: 0.88

  banned_words:
    enabled: true
    description: "Words that should never appear in output"
    severity: error
    words:
      - example_banned_term_1
      - example_banned_term_2

  url_leaks:
    enabled: true
    description: "Internal URLs that should not be in public-facing output"
    severity: error
    patterns:
      - staging.example.com
      - internal.example.net

  double_hyphen:
    enabled: true
    description: "Double-hyphen used as word separator instead of single hyphen"
    severity: warning
