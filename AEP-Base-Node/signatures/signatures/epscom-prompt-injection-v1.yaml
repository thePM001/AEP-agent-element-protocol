signature_version: "1"
id: epscom-prompt-injection-v1
authority: EPSCOM
name: Prompt injection override attempt
description: Detect classic instruction override patterns in tool inputs and agent messages.
severity: critical
category: injection
enabled: true
detection:
  type: regex
  case_insensitive: true
  patterns:
    - "ignore (all )?(previous|prior|above) instructions"
    - "disregard (your|the) (system|safety) (prompt|rules)"
    - "you are now (in )?(developer|admin|root) mode"
    - "reveal (the )?(system|hidden) prompt"
response:
  action: block
  dock: validation_engine
metadata:
  authored_by: EPSCOM
  revision: "2026-06-23"
  references:
    - arXiv:2604.05150