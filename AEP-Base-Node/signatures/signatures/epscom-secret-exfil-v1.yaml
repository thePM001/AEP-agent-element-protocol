signature_version: "1"
id: epscom-secret-exfil-v1
authority: EPSCOM
name: Secret and credential exfiltration pattern
description: Detect attempts to export API keys, tokens, or lattice secrets in outbound content.
severity: high
category: exfiltration
enabled: true
detection:
  type: regex
  case_insensitive: true
  patterns:
    - "(api[_-]?key|secret|token|password)\\s*[:=]\\s*['\"][A-Za-z0-9_\\-]{16,}"
    - "LATTICE_CHANNEL_SECRET"
    - "AEP_.*_TOKEN"
response:
  action: quarantine
  dock: validation_engine
metadata:
  authored_by: EPSCOM
  revision: "2026-06-23"